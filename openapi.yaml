  # ── Watch: External Search & Import ──────────────────────────────────────────

  /api/watch/external/search:
    get:
      summary: Search TMDB for movies or TV series
      operationId: externalSearch
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [movie, tv]
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: person
          in: query
          required: false
          description: Set to "true" to search by person/director name instead of title
          schema:
            type: string
      responses:
        '200':
          description: Search results with isDuplicate flag
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tmdbId:
                      type: integer
                    title:
                      type: string
                    releaseYear:
                      type: integer
                      nullable: true
                    runtimeMinutes:
                      type: integer
                      nullable: true
                    seasonCount:
                      type: integer
                      nullable: true
                    overview:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
                    isDuplicate:
                      type: boolean
                    localTitle:
                      type: string
        '503':
          description: TMDB_API_KEY not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/watch/external/import:
    post:
      summary: Import a TMDB result as a local movie or TV series
      operationId: externalImport
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [movie, tv]
                result:
                  type: object
                  properties:
                    tmdbId:
                      type: integer
                    title:
                      type: string
                      minLength: 1
                    releaseYear:
                      type: integer
                      nullable: true
                    runtimeMinutes:
                      type: integer
                      nullable: true
                    seasonCount:
                      type: integer
                      nullable: true
                    overview:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
                    isDuplicate:
                      type: boolean
                  required: [tmdbId, title, overview, genres, isDuplicate]
              required: [type, result]
      responses:
        '201':
          description: Movie or TV series created from TMDB data
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Movie'
                  - $ref: '#/components/schemas/TvSeries'
        '503':
          description: TMDB_API_KEY not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Deploy ────────────────────────────────────────────────────────────────────

  /api/deploy:
    post:
      summary: GitHub webhook deploy trigger
      description: Verified via HMAC-SHA256 using x-hub-signature-256 header. Only triggers on refs/heads/main.
      operationId: deployWebhook
      security: []
      parameters:
        - name: x-hub-signature-256
          in: header
          required: true
          schema:
            type: string
            description: "HMAC-SHA256 of the request body, format: sha256=<hex>"
      responses:
        '200':
          description: Push was not to main branch; no deploy triggered
        '202':
          description: Deploy triggered
        '403':
          description: Invalid signature
        '503':
          description: DEPLOY_SECRET not configured

  /api/admin/deploy:
    post:
      summary: Trigger a server deploy (admin only)
      description: Admin app deploy. Requires a session for user 1. Replaces the former /api/deploy/trigger.
      operationId: adminDeploy
      security:
        - cookieAuth: []
      responses:
        '202':
          description: Deploy triggered
        '401':
          description: Not authenticated (session required)
        '403':
          description: Not an admin (userId must be 1)

  /api/admin/backups/scheduled:
    post:
      summary: Run the scheduled backup now (admin only)
      description: Rolling export to exports/backup/ plus git commit/push when changed.
      operationId: adminRunScheduledBackup
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Backup ran; returns folder and whether it pushed
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/backups/scheduled/restore:
    post:
      summary: Restore from the last scheduled backup (admin only)
      operationId: adminRestoreScheduledBackup
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                confirm:
                  type: boolean
      responses:
        '200': { description: Restored }
        '400': { description: Confirmation required }
        '404': { description: No scheduled backup found }
        '409': { description: Migration mismatch }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/backups/timestamped:
    get:
      summary: List the 10 most recent timestamped backups (admin only)
      operationId: adminListTimestampedBackups
      security:
        - cookieAuth: []
      responses:
        '200': { description: List of backup folder names }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }
    post:
      summary: Run a timestamped backup now (admin only)
      operationId: adminRunTimestampedBackup
      security:
        - cookieAuth: []
      responses:
        '200': { description: Backup created; returns the folder name }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/backups/timestamped/{name}/restore:
    post:
      summary: Restore from a selected timestamped backup (admin only)
      operationId: adminRestoreTimestampedBackup
      security:
        - cookieAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                confirm:
                  type: boolean
      responses:
        '200': { description: Restored }
        '400': { description: Confirmation required }
        '404': { description: Unknown backup }
        '409': { description: Migration mismatch }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/users:
    get:
      summary: List all users (admin only)
      operationId: adminListUsers
      security:
        - cookieAuth: []
      responses:
        '200': { description: List of users }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }
    post:
      summary: Create a user (admin only)
      operationId: adminCreateUser
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                displayName: { type: string }
      responses:
        '201': { description: User created }
        '409': { description: Email already exists }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/users/{id}:
    delete:
      summary: Delete a user and their data (admin only)
      operationId: adminDeleteUser
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Deleted }
        '400': { description: Invalid id or attempt to delete the owner }
        '404': { description: User not found }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/users/{id}/password:
    put:
      summary: Change a user's password (admin only)
      operationId: adminSetUserPassword
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        '200': { description: Password updated }
        '404': { description: User not found }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/logs:
    get:
      summary: List available server logs (admin only)
      operationId: adminListLogs
      security:
        - cookieAuth: []
      responses:
        '200': { description: Log metadata for output, error, deploy, and backup logs }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }

  /api/admin/logs/{name}:
    get:
      summary: Tail a server log (admin only)
      description: name is one of output, error, deploy, backup (allowlisted).
      operationId: adminTailLog
      security:
        - cookieAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            enum: [output, error, deploy, backup]
        - name: lines
          in: query
          required: false
          schema: { type: integer, default: 200, maximum: 1000 }
      responses:
        '200': { description: The last N lines of the log }
        '404': { description: Unknown log }
        '401': { description: Not authenticated }
        '403': { description: Not an admin }
