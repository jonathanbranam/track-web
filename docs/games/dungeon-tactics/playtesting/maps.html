<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dungeon Tactics — Playtest Maps</title>
<style>
  :root {
    --open:#e9e4d4; --wall:#4a4a4a; --mountain:#8a6b4f; --forest:#3f7d44;
    --water:#3b6ea5; --pit:#1d1d1d; --fire:#d4592a; --grid:#bdb6a0;
    --pc:#1f6feb; --enemy:#c0392b;
  }
  * { box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    margin:0; padding:24px; background:#f6f3ea; color:#222; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:#666; margin:0 0 20px; font-size:14px; }
  a { color:var(--pc); }
  .maps { display:flex; flex-wrap:wrap; gap:32px; align-items:flex-start; }
  .map-card { background:#fff; border:1px solid #ddd; border-radius:10px;
    padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .map-card h2 { font-size:17px; margin:0 0 2px; }
  .map-card .desc { color:#666; font-size:13px; margin:0 0 12px; max-width:420px; }
  .grid { display:grid; gap:2px; background:var(--grid); padding:2px;
    border-radius:6px; width:max-content; }
  .tile { width:46px; height:46px; background:var(--open); border-radius:3px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; position:relative; user-select:none; }
  .tile.wall { background:var(--wall); }
  .tile.mountain { background:var(--mountain); }
  .tile.forest { background:var(--forest); }
  .tile.water { background:var(--water); }
  .tile.pit { background:var(--pit); }
  .tile.fire { background:var(--fire); }
  .tile .terr { position:absolute; top:2px; left:4px; font-size:10px;
    font-weight:400; opacity:.55; color:#000; }
  .tile.wall .terr, .tile.pit .terr, .tile.water .terr,
  .tile.mountain .terr, .tile.forest .terr, .tile.fire .terr { color:#fff; opacity:.7; }
  .token { width:30px; height:30px; border-radius:50%; color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    box-shadow:0 1px 2px rgba(0,0,0,.4); }
  .token.pc { background:var(--pc); }
  .token.enemy { background:var(--enemy); }
  .legend { display:flex; flex-wrap:wrap; gap:10px 18px; margin:24px 0 0;
    font-size:13px; max-width:720px; }
  .legend .item { display:flex; align-items:center; gap:6px; }
  .swatch { width:18px; height:18px; border-radius:4px; border:1px solid #0002; }
  .note { margin-top:8px; font-size:12px; color:#777; max-width:440px; }
</style>
</head>
<body>
  <h1>Dungeon Tactics — Playtest Maps</h1>
  <p class="sub">Visual reference for Playtest 01. See
    <a href="playtesting.md">playtesting.md</a> for full rules ·
    <a href="cards.html">Quick-ref cards &amp; trackers →</a></p>

  <div class="maps" id="maps"></div>

  <div class="legend" id="legend"></div>

<script>
// Terrain codes: . open  # wall  ^ mountain  f forest  w water  O pit  ~ fire
// Tokens: digits 1-4 = PCs (1 Berserker,2 Rogue,3 Ranger,4 Mage), B brute, A archer
const MAPS = [
  { name:"Map A — \"The Pool\" (8×8)",
    desc:"Central water pool is the prime Shove/Hook/Fireball drown target. Enemy-side forest for the Mage/Ranger to ignite. Mountain clusters block lanes and bite on collision. One pit. Enemies: 4 Brutes + 1 Archer.",
    rows:[
      "...^^..B",
      "...^.ff.",
      "12..ww.B",
      "34..ww..",
      "......fA",
      "..O..ffB",
      "....^...",
      "...^^..B",
    ]},
  { name:"Map B — \"The Long Field\" (8×10)",
    desc:"Wider than tall — the kiting/flanking test. Ranger gets real shoot-and-scoot distance, Rogue gets room to loop with passthrough. Bigger water pool + right-side forest stands. Mountains and the pit pinch the lanes. Enemies: 5 Brutes + 1 Archer.",
    rows:[
      "....^^...B",
      "12..^.ff..",
      "34....f..B",
      "...www...A",
      "...www...B",
      "..O....ff.",
      "....^..f.B",
      "...^^.....",
    ]},
];

const TERR = {
  '.':{cls:'',label:''}, '#':{cls:'wall',label:'wall'},
  '^':{cls:'mountain',label:'mtn'}, 'f':{cls:'forest',label:'forest'},
  'w':{cls:'water',label:'water'}, 'O':{cls:'pit',label:'pit'},
  '~':{cls:'fire',label:'fire'},
};
const PC_NAMES = {'1':'Berserker','2':'Rogue','3':'Ranger','4':'Mage'};

function buildMap(m){
  const card = document.createElement('div');
  card.className='map-card';
  card.innerHTML = `<h2>${m.name}</h2><p class="desc">${m.desc}</p>`;
  const cols = m.rows[0].length;
  const grid = document.createElement('div');
  grid.className='grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, 46px)`;
  for(const row of m.rows){
    for(const ch of row){
      const tile = document.createElement('div');
      let token = null;
      if(TERR[ch]){
        tile.className = 'tile '+TERR[ch].cls;
        if(TERR[ch].label) tile.innerHTML = `<span class="terr">${TERR[ch].label}</span>`;
      } else {
        tile.className = 'tile';
        tile.innerHTML = `<span class="terr"></span>`;
        if(PC_NAMES[ch]){
          token = document.createElement('div');
          token.className='token pc'; token.textContent=ch;
          token.title = PC_NAMES[ch];
        } else if(ch==='B' || ch==='A'){
          token = document.createElement('div');
          token.className='token enemy'; token.textContent=ch;
          token.title = ch==='B'?'Brute':'Archer';
        }
      }
      if(token) tile.appendChild(token);
      grid.appendChild(tile);
    }
  }
  card.appendChild(grid);
  card.insertAdjacentHTML('beforeend',
    `<p class="note">1 Berserker · 2 Rogue · 3 Ranger · 4 Mage · B Brute · A Archer.
     Party left, enemies right.</p>`);
  return card;
}

const legendItems = [
  ['open','--open'],['wall (#) +2 collide','--wall'],
  ['mountain (^) block, +3','--mountain'],['forest (f) ignites→fire','--forest'],
  ['water (w) drown','--water'],['pit (O) removed','--pit'],
  ['fire (~) 2 dmg','--fire'],
];
const legend = document.getElementById('legend');
for(const [label,varName] of legendItems){
  const el = document.createElement('div'); el.className='item';
  el.innerHTML = `<span class="swatch" style="background:var(${varName})"></span>${label}`;
  legend.appendChild(el);
}
legend.insertAdjacentHTML('beforeend',
  `<div class="item"><span class="swatch" style="background:var(--pc)"></span>PC</div>
   <div class="item"><span class="swatch" style="background:var(--enemy)"></span>Enemy</div>`);

const wrap = document.getElementById('maps');
MAPS.forEach(m => wrap.appendChild(buildMap(m)));
</script>
</body>
</html>
