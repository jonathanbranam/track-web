  /api/trips/{id}/packing/items/bulk:
    put:
      summary: Bulk-replace packing items (owner only)
      description: |
        ID-aware upsert. Items with `id` are updated in-place (preserving their primary key and any packing_state rows that reference them). Items without `id` are inserted as new rows. Items absent from the payload are deleted, scoped to the userId values present in the payload — items for users not mentioned are left untouched. All operations run in a single transaction. Returns 400 if any provided `id` does not belong to this trip.
      operationId: bulkReplacePackingItems
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Existing item ID to update in-place; omit to insert a new item
                      section:
                        type: string
                        default: ''
                      text:
                        type: string
                      position:
                        type: integer
                        default: 0
                      userId:
                        type: integer
                        nullable: true
                        description: Assign item to a specific user (personal) or null/absent (shared)
                    required: [text]
              required: [items]
      responses:
        '200':
          description: Items updated; returns full list in section/position order
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PackingItem'
                required: [items]
        '400':
          description: One or more item IDs not found for this trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member or not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

