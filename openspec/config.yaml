schema: spec-driven

context: |
  Monorepo: TypeScript, React 19 + React Router v7, Hono + SQLite (better-sqlite3)
  Apps: client-time (time tracking), client-watch (movies/TV), client-food (dining); backend in src/
  UI: Tailwind CSS 4, dark-only, mobile-first; fixed bottom nav; safe areas via --sat/--sab CSS vars
  Data: timestamps as ISO 8601 UTC; tags as bare lowercase comma-separated; repository pattern (interfaces + SQLite impls)
  Deploy: each new client app requires updates to Caddyfile, Caddyfile.local, server-deploy.sh, dev-local.sh

rules:
  proposal:
    - 'Permission model defaults to equal rights for all participants (no ownership tiers) unless the change explicitly requires restrictions'
  design:
    - Add testing to ensure coverage of new requirements
    - 'Permission model defaults to equal rights for all participants (no ownership tiers) unless the change explicitly requires restrictions'
    - Add an admin CLI command for every API operation so all behavior is accessible without a UI
    - All CLI commands that return data must support a --json flag for script-friendly output
    - 'When adding or removing a database table in src/db.ts, update TABLE_NAMES in the same file to keep the export/import list current'
  tasks:
    - Verify that existing and new tests pass
    - Include tasks for Caddyfile, Caddyfile.local, server-deploy.sh, dev-local.sh when adding a new client app
    - Include a task to build every affected client app (npm run build:watch, build:time, etc.) and confirm zero TypeScript errors before marking implementation complete
    - If the change includes new env vars or other server setup document it in the project README.md
    - Update the README.md with any new CLI commands
  specs:
    - 'Add **App**: <name> to each spec; use "all" for cross-cutting specs'
