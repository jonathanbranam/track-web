openapi: 3.0.3

info:
  title: track-web API
  description: Self-hosted time tracking, watch tracking, trips, and social API.
  version: 1.0.0

servers:
  - url: https://time.branam.us
    description: Time tracking app
  - url: https://watch.branam.us
    description: Watch tracking app
  - url: https://trips.branam.us
    description: Trips app
  - url: https://proto.branam.us
    description: Proto app

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
      required: [ok]

    TimeEntry:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        appId:
          type: string
        description:
          type: string
        tags:
          type: string
          description: Comma-separated bare tag words (no prefix)
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, userId, appId, description, tags, startedAt]

    Trip:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        destination:
          type: string
          nullable: true
        departureNotes:
          type: string
          nullable: true
        returnNotes:
          type: string
          nullable: true
        nights:
          type: integer
          nullable: true
        fullDays:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        infoMarkdown:
          type: string
          nullable: true
        isCurrent:
          type: boolean
      required: [id, userId, name]

    TripMember:
      type: object
      properties:
        userId:
          type: integer
        role:
          type: string
          enum: [owner, member]
        joinedAt:
          type: string
          format: date-time
      required: [userId, role, joinedAt]

    TripDay:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        date:
          type: string
          format: date
        title:
          type: string
        body:
          type: string
        weather:
          type: string
          nullable: true
      required: [id, tripId, date, title, body]

    PackingItem:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        section:
          type: string
        text:
          type: string
        position:
          type: integer
        userId:
          type: integer
          nullable: true
          description: User this item belongs to; null means shared (visible to all members)
      required: [id, tripId, section, text, position, userId]

    ApiToken:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
      required: [id, label, createdAt, expiresAt]

    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        runtimeMinutes:
          type: integer
          nullable: true
        releaseYear:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        streaming:
          type: string
          nullable: true
        tmdbId:
          type: integer
          nullable: true
        addedByUserId:
          type: integer
      required: [id, title, addedByUserId]

    TvSeries:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        streaming:
          type: string
          nullable: true
        episodeRuntimeMinutes:
          type: integer
          nullable: true
        seasonCount:
          type: integer
          nullable: true
        releaseYear:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        tmdbId:
          type: integer
          nullable: true
        addedByUserId:
          type: integer
      required: [id, title, addedByUserId]

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required: [id, name]

paths:
  # ── OpenAPI spec ────────────────────────────────────────────────────────────

  /api/llm-context.md:
    get:
      summary: Get LLM agent context guide
      description: Returns a Markdown document describing the app's purpose, auth model, feature areas, and key conventions. Intended for LLM agents to load as context before using the API.
      operationId: getLlmContext
      security: []
      responses:
        '200':
          description: Markdown context document
          content:
            text/markdown:
              schema:
                type: string
        '404':
          description: Context file not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/openapi.json:
    get:
      summary: Get OpenAPI spec
      description: Returns the parsed OpenAPI spec as JSON. No authentication required.
      operationId: getOpenApiSpec
      security: []
      responses:
        '200':
          description: OpenAPI document as JSON
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Spec file not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Auth ────────────────────────────────────────────────────────────────────

  /api/auth/login:
    post:
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
              required: [email, password]
      responses:
        '200':
          description: Login successful; sets session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/logout:
    post:
      summary: Logout
      operationId: logout
      security: []
      responses:
        '200':
          description: Session cookie cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /api/auth/me:
    get:
      summary: Get current user
      operationId: getMe
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  displayName:
                    type: string
                required: [userId, displayName]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/forgot:
    post:
      summary: Forgot login (honeypot)
      description: Logs the attempt server-side and always returns a generic message.
      operationId: forgotLogin
      security: []
      responses:
        '200':
          description: Generic message (always returned regardless of input)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/auth/tokens:
    post:
      summary: Create API token
      operationId: createToken
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  minLength: 1
                days:
                  type: integer
                  minimum: 1
                  maximum: 180
              required: [label, days]
      responses:
        '201':
          description: Token created; raw token returned once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiToken'
                  - type: object
                    properties:
                      token:
                        type: string
                        description: Raw token value — only returned at creation
                    required: [token]
        '401':
          description: Not authenticated (session required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List API tokens
      operationId: listTokens
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of tokens (no raw token values)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiToken'
        '401':
          description: Not authenticated (session required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/tokens/{id}:
    delete:
      summary: Delete API token
      operationId: deleteToken
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Token deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          description: Not authenticated (session required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Time Entries ─────────────────────────────────────────────────────────────

  /api/time/entries/running:
    get:
      summary: Get running entry
      operationId: getRunningEntry
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Currently running entry or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  entry:
                    oneOf:
                      - $ref: '#/components/schemas/TimeEntry'
                      - type: 'null'
                required: [entry]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/time/entries:
    get:
      summary: List entries for a day
      operationId: listEntries
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          description: Date in YYYY-MM-DD format (defaults to today in ET using 4 AM boundary)
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
      responses:
        '200':
          description: Entries for the day
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeEntry'
                required: [entries]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Start a new time entry
      operationId: createEntry
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  minLength: 1
                  maxLength: 500
                startedAt:
                  type: string
                  format: date-time
              required: [description, startedAt]
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  entry:
                    $ref: '#/components/schemas/TimeEntry'
                required: [entry]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A task is already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Start time conflicts with previous entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  previousEndedAt:
                    type: string
                    format: date-time

  /api/time/entries/{id}:
    patch:
      summary: Update a time entry
      operationId: updateEntry
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  minLength: 1
                  maxLength: 500
                startedAt:
                  type: string
                  format: date-time
                endedAt:
                  type: string
                  format: date-time
              minProperties: 1
      responses:
        '200':
          description: Entry updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  entry:
                    $ref: '#/components/schemas/TimeEntry'
                required: [entry]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invalid input or time conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a time entry
      operationId: deleteEntry
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Entry deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Trips ────────────────────────────────────────────────────────────────────

  /api/trips/current:
    get:
      summary: Get current trip
      operationId: getCurrentTrip
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Current trip
          content:
            application/json:
              schema:
                type: object
                properties:
                  trip:
                    $ref: '#/components/schemas/Trip'
                required: [trip]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No current trip set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips:
    get:
      summary: List all trips
      operationId: listTrips
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: List of trips
          content:
            application/json:
              schema:
                type: object
                properties:
                  trips:
                    type: array
                    items:
                      $ref: '#/components/schemas/Trip'
                required: [trips]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a trip
      operationId: createTrip
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                destination:
                  type: string
                  maxLength: 200
                  nullable: true
                departureNotes:
                  type: string
                  maxLength: 2000
                  nullable: true
                returnNotes:
                  type: string
                  maxLength: 2000
                  nullable: true
                nights:
                  type: integer
                  minimum: 0
                  nullable: true
                fullDays:
                  type: integer
                  minimum: 0
                  nullable: true
                startDate:
                  type: string
                  format: date
                  nullable: true
                endDate:
                  type: string
                  format: date
                  nullable: true
                infoMarkdown:
                  type: string
                  nullable: true
              required: [name]
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                type: object
                properties:
                  trip:
                    $ref: '#/components/schemas/Trip'
                required: [trip]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/{id}/members:
    get:
      summary: List trip members
      operationId: listTripMembers
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/TripMember'
                required: [members]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member of this trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Add a member to a trip
      operationId: addTripMember
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
              required: [userId]
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: '#/components/schemas/TripMember'
                required: [member]
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not the trip owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trip or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/{id}/members/{userId}:
    delete:
      summary: Remove a member from a trip
      operationId: removeTripMember
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Member removed
        '400':
          description: Cannot remove yourself as owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not the trip owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trip or member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/{id}/set-current:
    put:
      summary: Set a trip as current (owner only)
      operationId: setCurrentTrip
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Trip set as current
          content:
            application/json:
              schema:
                type: object
                properties:
                  trip:
                    $ref: '#/components/schemas/Trip'
                required: [trip]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member or not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/{id}:
    put:
      summary: Update a trip (owner only)
      operationId: updateTrip
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                destination:
                  type: string
                  maxLength: 200
                  nullable: true
                departureNotes:
                  type: string
                  maxLength: 2000
                  nullable: true
                returnNotes:
                  type: string
                  maxLength: 2000
                  nullable: true
                nights:
                  type: integer
                  minimum: 0
                  nullable: true
                fullDays:
                  type: integer
                  minimum: 0
                  nullable: true
                startDate:
                  type: string
                  format: date
                  nullable: true
                endDate:
                  type: string
                  format: date
                  nullable: true
                infoMarkdown:
                  type: string
                  nullable: true
              minProperties: 1
      responses:
        '200':
          description: Trip updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  trip:
                    $ref: '#/components/schemas/Trip'
                required: [trip]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member or not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a trip (owner only)
      operationId: deleteTrip
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Trip deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member or not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/{id}/days:
    get:
      summary: List all day records for a trip
      operationId: listTripDays
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of day records ordered by date
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: array
                    items:
                      $ref: '#/components/schemas/TripDay'
                required: [days]
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member of the trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/{id}/days/{date}:
