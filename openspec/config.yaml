schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
    Tech stack: TypeScript, React PWA frontend, Node.js, Hono backend
    Backend in src folder; Frontend in client folder
    Domain: single-user, self-hosted time tracking PWA

rules:
  design:
    - Add testing to ensure coverage of new requirements
    - Update the README.md with any new CLI commands
  tasks:
    - Verify that existing and new tests pass
  specs:
    - Each spec should indicate which app it relates to; Use "all" for cross-cutting specifications. Add **App**: <name> to each new spec.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
#
